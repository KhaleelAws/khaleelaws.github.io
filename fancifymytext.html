<!DOCTYPE html>
<html>
<head>
    <title>Fancify Shamcify</title>

    <!-- Link to JS file -->
    <script src="fancifymytext.js"></script>
</head>

<body>
    <h1>Fancify my Text</h1>

    <!-- Text Field -->
    <fieldset>
        <legend>Text</legend>
        <textarea id="textArea" rows="4" cols="30"></textarea>
    </fieldset>

    <!-- Controls -->
    <fieldset>
        <legend>Fancify</legend>

        <!-- Bigger button -->
        <button onclick="makeBigger()">Bigger!</button>

        <br><br>

        <!-- Radio buttons -->
        <input type="radio" id="fancy" name="style" onchange="fancifyText()">
        <label for="fancy">FancyShmancy</label>

        <input type="radio" id="boring" name="style" onchange="fancifyText()">
        <label for="boring">BoringBetty</label>

        <br><br>

        <!-- Moo button -->
        <button onclick="mooText()">Moo</button>
    </fieldset>

</body>
</html>
